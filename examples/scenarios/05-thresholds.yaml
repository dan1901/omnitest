# 05-thresholds.yaml
# 임계값(Threshold) Pass/Fail 데모.
# CI/CD 파이프라인에서 성능 기준을 자동 검증할 때 사용.
# exit code: 0=PASS, 1=FAIL (threshold 미달)
#
# 실행:
#   omnitest run examples/scenarios/05-thresholds.yaml
#   echo "Exit code: $?"

version: "1"

targets:
  - name: "demo"
    base_url: "http://localhost:8888"

scenarios:
  - name: "임계값 검증 테스트"
    target: "demo"
    vusers: 30
    duration: "20s"
    ramp_up: "5s"
    requests:
      - method: GET
        path: "/api/users"

thresholds:
  - metric: "http_req_duration_p99"
    condition: "< 200ms"           # P99 응답시간 200ms 미만
  - metric: "http_req_duration_p95"
    condition: "< 100ms"           # P95 응답시간 100ms 미만
  - metric: "http_req_failed"
    condition: "< 1%"              # 에러율 1% 미만
  - metric: "http_req_duration_avg"
    condition: "< 80ms"            # 평균 응답시간 80ms 미만
