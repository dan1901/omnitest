# 03-multi-endpoint.yaml
# 다중 타겟 + 다중 시나리오 데모.
# 하나의 YAML에서 여러 엔드포인트를 동시에 테스트.
#
# 실행:
#   omnitest run examples/scenarios/03-multi-endpoint.yaml

version: "1"

targets:
  - name: "demo-api"
    base_url: "http://localhost:8888"
    headers:
      Accept: "application/json"

scenarios:
  - name: "사용자 API 부하"
    target: "demo-api"
    vusers: 20
    duration: "20s"
    requests:
      - method: GET
        path: "/api/users"

  - name: "상품 API 부하"
    target: "demo-api"
    vusers: 30
    duration: "20s"
    ramp_up: "5s"
    requests:
      - method: GET
        path: "/api/products"

  - name: "검색 API 부하"
    target: "demo-api"
    vusers: 15
    duration: "20s"
    requests:
      - method: GET
        path: "/api/search?q=omnitest"
